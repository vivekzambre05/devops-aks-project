name: CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: Azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name vivekacr001

      # 🔥 IMPORTANT: setup buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔥 Multi-arch build
      - name: Build & Push Multi-Arch Image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t vivekacr001.azurecr.io/node-app:${{ github.sha }} \
            --push .

      - name: Update Helm values
        run: |
          sed -i "s/tag:.*/tag: ${{ github.sha }}/" helm/node-app/values.yaml

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add helm/node-app/values.yaml
          git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes"
          git push